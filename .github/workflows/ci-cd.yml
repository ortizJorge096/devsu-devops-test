name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18.19"
  AWS_REGION: us-east-1

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # 1) Lint
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  # ───────────────────────────────────────────────────────────────────────
  # 2) Unit tests + coverage
  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────
  # 3) SAST — secret + JS static analysis
  # ───────────────────────────────────────────────────────────────────────
  sast:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
      - name: njsscan — Node.js SAST
        uses: ajinabraham/njsscan-action@master
        with:
          args: 'app --sarif --output njsscan.sarif || true'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: njsscan.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 4) Build & push container image to Amazon ECR (via OIDC)
  # ───────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: [test, sast]
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.tags.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Debug OIDC sub
      #   run: |
      #     curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
      #       -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
      #       | python3 -c "import sys,json,base64; t=json.load(sys.stdin)['value']; p=t.split('.')[1]; p+='='*(4-len(p)%4); c=json.loads(base64.b64decode(p)); print('sub:',c.get('sub'))"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Compute tags
        id: tags
        run: |
          REG="${{ steps.ecr.outputs.registry }}"
          # Pick repo based on branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            REPO="devsu-devops-test-prod-nodejs"
          else
            REPO="devsu-devops-test-dev-nodejs"
          fi
          SHA="sha-$(git rev-parse --short HEAD)"
          BRANCH="$(echo '${{ github.ref_name }}' | tr '/' '-')"
          IMAGE="$REG/$REPO"
          {
            echo "image=$IMAGE"
            echo "sha_tag=$IMAGE:$SHA"
            echo "branch_tag=$IMAGE:$BRANCH"
            echo "latest_tag=$IMAGE:latest"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=demo-devops-nodejs
            org.opencontainers.image.licenses=MIT

  # ───────────────────────────────────────────────────────────────────────
  # 5) Vulnerability scan with Trivy
  # ───────────────────────────────────────────────────────────────────────
  image-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-push.outputs.sha_tag }}
          format: 'sarif'
          output: 'trivy.sarif'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 6) Validate K8s manifests
  # ───────────────────────────────────────────────────────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize & kubeconform
        run: |
          set -eu
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Build base + overlays
        run: |
          mkdir -p out
          kustomize build k8s/overlays/local > out/local.yaml
          kustomize build k8s/overlays/dev   > out/dev.yaml
          kustomize build k8s/overlays/prod  > out/prod.yaml
      - name: kubeconform — schema validation
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            out/local.yaml out/dev.yaml out/prod.yaml

  # ───────────────────────────────────────────────────────────────────────
  # 7) Deploy to k3s — DEV (develop branch)
  #
  # The runner lives inside the EC2 that hosts k3s-dev. kubectl is direct —
  # no SSM, no OIDC, no AWS credentials needed: the local kubeconfig
  # (/home/ghrunner/.kube/config, copied from /etc/rancher/k3s/k3s.yaml
  # in user-data) holds cluster-admin over the local k3s. containerd is
  # already authenticated to ECR via the instance profile, so image pulls
  # work without imagePullSecrets.
  # ───────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to k3s (dev)
    runs-on: [self-hosted, k3s-dev]
    needs: [build-push, image-scan, validate-k8s]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: dev
      url: ${{ vars.APP_URL_DEV }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize (if missing)
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin
          fi
          kustomize version

      - name: Set image tag and apply
        env:
          IMG: ${{ needs.build-push.outputs.sha_tag }}
        run: |
          set -euxo pipefail
          cd k8s/overlays/dev
          kustomize edit set image devsu-devops-nodejs="$IMG"
          cd "$GITHUB_WORKSPACE"
          kustomize build k8s/overlays/dev | kubectl apply -f -
          kubectl -n demo-devops-dev rollout status deployment/demo-devops --timeout=300s

      - name: Print cluster state (audit)
        if: always()
        run: |
          echo "── Pods ──"
          kubectl -n demo-devops-dev get pods -o wide
          echo "── Services ──"
          kubectl -n demo-devops-dev get svc
          echo "── Ingress ──"
          kubectl -n demo-devops-dev get ingress
          echo "── HPA ──"
          kubectl -n demo-devops-dev get hpa || true

  # ───────────────────────────────────────────────────────────────────────
  # 8) Deploy to k3s — PROD (main branch)
  #
  # The runner lives inside the EC2 that hosts k3s-prod. kubectl is direct —
  # no SSM, no OIDC, no AWS credentials needed: the local kubeconfig holds
  # cluster-admin over the local k3s. containerd is authenticated to ECR
  # via the instance profile. The nip.io host is resolved via IMDSv2 so
  # cert-manager and traefik agree on the FQDN for the Let's Encrypt
  # HTTP-01 challenge (see ADR-005 + ADR-008).
  # ───────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to k3s (prod)
    runs-on: [self-hosted, k3s-prod]
    needs: [build-push, image-scan, validate-k8s]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.APP_URL_PROD }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize (if missing)
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
              | sudo tar -xz -C /usr/local/bin
          fi
          kustomize version

      - name: Resolve nip.io host (IMDSv2)
        # The runner is colocated with the k3s-prod node, so the EC2 public
        # IPv4 equals the Elastic IP attached to this instance. We derive
        # demo-devops.<ip-dashed>.nip.io — a free wildcard DNS that resolves
        # back to that IP — so Let's Encrypt's HTTP-01 challenge can succeed
        # without owning a real domain.
        id: host
        run: |
          set -euo pipefail
          TOKEN=$(curl -fsSL -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 60")
          IP=$(curl -fsSL -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/public-ipv4)
          HOST="demo-devops.${IP//./-}.nip.io"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "Prod public host: $HOST"

      - name: Set image tag and apply
        env:
          IMG: ${{ needs.build-push.outputs.sha_tag }}
          PROD_HOST: ${{ steps.host.outputs.host }}
        run: |
          set -euxo pipefail
          # Replace the placeholder host in both the Ingress patch
          # (kustomization.yaml) and the TLS strategic-merge patch
          # (tls-patch.yaml) so cert-manager and traefik agree on the FQDN.
          sed -i "s|demo-devops.example.com|${PROD_HOST}|g" \
            k8s/overlays/prod/kustomization.yaml \
            k8s/overlays/prod/tls-patch.yaml

          cd k8s/overlays/prod
          kustomize edit set image devsu-devops-nodejs="$IMG"
          cd "$GITHUB_WORKSPACE"

          kustomize build k8s/overlays/prod | kubectl apply -f -
          kubectl -n demo-devops rollout status deployment/demo-devops --timeout=300s

      - name: Print cluster state (audit)
        if: always()
        run: |
          echo "── Pods ──"
          kubectl -n demo-devops get pods -o wide
          echo "── Services ──"
          kubectl -n demo-devops get svc
          echo "── Ingress ──"
          kubectl -n demo-devops get ingress
          echo "── HPA ──"
          kubectl -n demo-devops get hpa || true
          echo "── cert-manager / Let's Encrypt ──"
          kubectl -n demo-devops get certificate,certificaterequest,order,challenge 2>/dev/null || \
            echo "(cert-manager CRDs not present — TLS will fall back to traefik self-signed)"