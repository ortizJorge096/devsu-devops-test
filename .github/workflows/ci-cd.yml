name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Minimal default permissions; each job widens what it needs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18.19"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsu-devops-nodejs

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # 1) Lint
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  # ───────────────────────────────────────────────────────────────────────
  # 2) Unit tests + coverage
  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────
  # 3) SAST — secret + JS static analysis
  # ───────────────────────────────────────────────────────────────────────
  sast:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
      - name: njsscan — Node.js SAST
        uses: ajinabraham/njsscan-action@master
        with:
          args: 'app --sarif --output njsscan.sarif || true'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: njsscan.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 4) Build & push container image to Amazon ECR (via OIDC)
  # ───────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: [test, sast]
    permissions:
      contents: read
      id-token: write   # required to fetch the OIDC JWT
    outputs:
      image: ${{ steps.tags.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Compute tags
        id: tags
        run: |
          REG="${{ steps.ecr.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="sha-$(git rev-parse --short HEAD)"
          BRANCH="$(echo '${{ github.ref_name }}' | tr '/' '-')"
          IMAGE="$REG/$REPO"
          {
            echo "image=$IMAGE"
            echo "sha_tag=$IMAGE:$SHA"
            echo "branch_tag=$IMAGE:$BRANCH"
            echo "latest_tag=$IMAGE:latest"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=demo-devops-nodejs
            org.opencontainers.image.licenses=MIT

  # ───────────────────────────────────────────────────────────────────────
  # 5) Vulnerability scan with Trivy (against the pushed ECR image)
  # ───────────────────────────────────────────────────────────────────────
  image-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.build-push.outputs.sha_tag }}
          format: 'sarif'
          output: 'trivy.sarif'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 6) Validate K8s manifests (kubeconform + kustomize build)
  # ───────────────────────────────────────────────────────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize & kubeconform
        run: |
          set -eu
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Build base + overlays
        run: |
          mkdir -p out
          kustomize build k8s/overlays/local > out/local.yaml
          kustomize build k8s/overlays/prod  > out/prod.yaml
      - name: kubeconform — schema validation
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            out/local.yaml out/prod.yaml

  # ───────────────────────────────────────────────────────────────────────
  # 7) Deploy to k3s on EC2 (main branch only) — pin to the exact SHA tag
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to k3s (EC2)
    runs-on: ubuntu-latest
    needs: [build-push, image-scan, validate-k8s]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Render prod manifests pinned to this commit's ECR tag
        run: |
          cd k8s/overlays/prod
          kustomize edit set image devsu-devops-nodejs=${{ needs.build-push.outputs.sha_tag }}
          cd ../../..
          kustomize build k8s/overlays/prod > rendered.yaml
      - name: Deploy via SSH
        if: ${{ secrets.EC2_SSH_KEY != '' && secrets.EC2_HOST != '' }}
        env:
          EC2_HOST:    ${{ secrets.EC2_HOST }}
          EC2_USER:    ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_ed25519 rendered.yaml "$EC2_USER@$EC2_HOST:/tmp/rendered.yaml"
          ssh -i ~/.ssh/id_ed25519 "$EC2_USER@$EC2_HOST" \
            "sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply -f /tmp/rendered.yaml && \
             sudo kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml -n demo-devops rollout status deploy/demo-devops --timeout=300s"
