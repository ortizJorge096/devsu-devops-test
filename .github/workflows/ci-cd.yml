name: CI/CD

on:
  push:
    branches: [develop]

  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]
  workflow_dispatch: {}

# Minimal default permissions; each job widens what it needs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18.19"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsu-devops-nodejs

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # 1) Lint
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  # ───────────────────────────────────────────────────────────────────────
  # 2) Unit tests + coverage
  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────
  # 3) SAST — secret + JS static analysis
  # ───────────────────────────────────────────────────────────────────────
  sast:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
      - name: njsscan — Node.js SAST
        uses: ajinabraham/njsscan-action@master
        with:
          args: 'app --sarif --output njsscan.sarif || true'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: njsscan.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 4) Build & push container image to Amazon ECR (via OIDC)
  # ───────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    needs: [test, sast]
    permissions:
      contents: read
      id-token: write   # required to fetch the OIDC JWT
    outputs:
      image: ${{ steps.tags.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Compute tags
        id: tags
        run: |
          REG="${{ steps.ecr.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA="sha-$(git rev-parse --short HEAD)"
          BRANCH="$(echo '${{ github.ref_name }}' | tr '/' '-')"
          IMAGE="$REG/$REPO"
          {
            echo "image=$IMAGE"
            echo "sha_tag=$IMAGE:$SHA"
            echo "branch_tag=$IMAGE:$BRANCH"
            echo "latest_tag=$IMAGE:latest"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.branch_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=demo-devops-nodejs
            org.opencontainers.image.licenses=MIT

  # ───────────────────────────────────────────────────────────────────────
  # 5) Vulnerability scan with Trivy (against the pushed ECR image)
  # ───────────────────────────────────────────────────────────────────────
  image-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-push.outputs.sha_tag }}
          format: 'sarif'
          output: 'trivy.sarif'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

  # ───────────────────────────────────────────────────────────────────────
  # 6) Validate K8s manifests (kubeconform + kustomize build)
  # ───────────────────────────────────────────────────────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize & kubeconform
        run: |
          set -eu
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Build base + overlays
        run: |
          mkdir -p out
          kustomize build k8s/overlays/local > out/local.yaml
          kustomize build k8s/overlays/dev   > out/dev.yaml
          kustomize build k8s/overlays/prod  > out/prod.yaml
      - name: kubeconform — schema validation
        run: |
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            out/local.yaml out/dev.yaml out/prod.yaml

  # ───────────────────────────────────────────────────────────────────────
  # 7) Deploy to k3s on EC2 via SSM Send-Command
  #
  # Branch → Environment mapping (configured in GitHub UI per environment):
  #   - main    → production  (manual approval recommended)
  #   - develop → dev
  #
  # No SSH: uses AWS Systems Manager (SSM) Send-Command. The IAM role assumed
  # via OIDC has ssm:SendCommand + GetCommandInvocation scoped to the project's
  # EC2 instance (provisioned by terraform/modules/github-oidc).
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to k3s (SSM)
    runs-on: ubuntu-latest
    needs: [build-push, image-scan, validate-k8s]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      && github.event_name == 'push'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'dev' }}
      url:  ${{ vars.APP_URL }}

    permissions:
      contents: read
      id-token: write   # OIDC to assume the AWS role
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find target EC2 instance by tag
        id: ec2
        run: |
          # The ec2-k3s module tags the instance with Component=runtime + Project=devsu-devops-test.
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Component,Values=runtime" \
              "Name=tag:Project,Values=devsu-devops-test" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No EC2 instance found with Component=runtime"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found EC2: $INSTANCE_ID"

      - name: Resolve environment overlay
        id: env
        run: |
          # Branch → overlay + namespace mapping.
          # main → prod overlay  (namespace: demo-devops)
          # develop → dev overlay (namespace: demo-devops-dev)
          if [ '${{ github.ref_name }}' = 'main' ]; then
            echo "overlay=prod"        >> "$GITHUB_OUTPUT"
            echo "namespace=demo-devops"     >> "$GITHUB_OUTPUT"
          else
            echo "overlay=dev"         >> "$GITHUB_OUTPUT"
            echo "namespace=demo-devops-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Render command body
        id: cmd
        run: |
          IMG='${{ needs.build-push.outputs.sha_tag }}'
          OVERLAY='${{ steps.env.outputs.overlay }}'
          NS='${{ steps.env.outputs.namespace }}'
          {
            echo 'commands<<COMMANDS_EOF'
            cat <<COMMANDS
          set -euxo pipefail
          cd /opt/devsu/repo
          git fetch origin && git reset --hard origin/${{ github.ref_name }}
          cd k8s/overlays/${OVERLAY}
          /usr/local/bin/kustomize edit set image devsu-devops-nodejs=${IMG}
          cd /opt/devsu/repo
          /usr/local/bin/kustomize build k8s/overlays/${OVERLAY} \
            | kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml apply -f -
          kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
            -n ${NS} rollout status deployment/demo-devops --timeout=300s
          COMMANDS
            echo 'COMMANDS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send command to EC2 via SSM
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ needs.build-push.outputs.sha_tag }} from ${{ github.ref_name }}@${{ github.sha }}" \
            --parameters "commands=$(echo '${{ steps.cmd.outputs.commands }}' | jq -Rs .)" \
            --output text --query 'Command.CommandId')
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "SSM CommandId: $CMD_ID"

      - name: Wait for SSM command to finish
        run: |
          CMD_ID='${{ steps.ssm.outputs.command_id }}'
          INSTANCE='${{ steps.ec2.outputs.instance_id }}'
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            case "$STATUS" in
              Success)
                echo "::notice::Deploy succeeded"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                  --query 'StandardOutputContent' --output text | tail -20
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::Deploy ended with status $STATUS"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE"
                exit 1 ;;
            esac
            sleep 10
          done
          echo "::error::Timeout waiting for SSM command"
          exit 1
