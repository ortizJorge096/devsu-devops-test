# IMPORTANT: This is an example Secret with placeholder values committed
# purely so the local-cluster demo works out of the box. In a real
# environment these values must come from an external secret manager
# (AWS Secrets Manager + External Secrets Operator, Sealed Secrets,
# SOPS, etc.) and the file below would only contain references.
#
# Values are base64-encoded plaintext: "user" and "password".
# Decode with:  echo -n dXNlcg== | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: demo-devops-secret
  labels:
    app.kubernetes.io/name: demo-devops
    app.kubernetes.io/component: api
type: Opaque
data:
  DATABASE_USER: dXNlcg==           # "user"
  DATABASE_PASSWORD: cGFzc3dvcmQ=   # "password"
