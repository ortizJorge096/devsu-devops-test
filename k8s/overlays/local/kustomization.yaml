apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-devops

resources:
  - ../../base

# Local minikube / docker-desktop / kind overlay.
# Uses ingress-nginx as the ingress controller.
patches:
  - target:
      kind: Ingress
      name: demo-devops
    patch: |-
      - op: add
        path: /spec/ingressClassName
        value: nginx
      - op: replace
        path: /spec/rules/0/host
        value: demo-devops.local

  # Force kubelet to use the image that's already present in the local
  # container runtime (we built it via `eval $(minikube docker-env)`).
  # Without this, kubelet tries to pull from docker.io and fails because
  # the image has no registry prefix.
  - target:
      kind: Deployment
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

images:
  - name: devsu-devops-nodejs
    # For local development, the image is built locally and tagged "dev".
    # Run:  eval $(minikube docker-env) && docker build -t demo-devops-nodejs:dev ./app
    newName: demo-devops-nodejs
    newTag: dev
