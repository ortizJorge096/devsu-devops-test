apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-devops

resources:
  - ../../base

# Prod overlay = k3s single-node on EC2 (AWS Free Tier).
# k3s ships with Traefik as the default ingress controller, so we wire
# the Ingress to it. The public host is `demo-devops.example.com` here
# as a placeholder — both the user-data first-boot script and the CI/CD
# deploy job rewrite it to `demo-devops.<EIP-with-dashes>.nip.io` so the
# Let's Encrypt HTTP-01 challenge can resolve back to this host.
#
# TLS lives in `tls-patch.yaml` (separate file so the cert-manager
# annotation + tls: block stays readable). See ADR-005 + ADR-008.
patches:
  - target:
      kind: Ingress
      name: demo-devops
    patch: |-
      - op: add
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /spec/rules/0/host
        value: demo-devops.18-235-142-69.nip.io   # rewritten by user-data / deploy script

  - path: tls-patch.yaml
    target:
      kind: Ingress
      name: demo-devops

  # 2 replicas on AWS — t3.medium (4 GiB RAM) has the headroom that the
  # original t3.micro did not. Matches the brief's "≥ 2 replicas" rule on
  # the prod path too, not only on dev/local. See docs/decisions/ADR-006
  # for the historical context (it documents the older t3.micro trade-off).
  - target:
      kind: Deployment
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # With 2 replicas, minAvailable: 1 keeps at least one pod serving
  # traffic during voluntary disruptions (node drain, rolling update)
  # without blocking evictions (which `minAvailable: 2` would do).
  - target:
      kind: PodDisruptionBudget
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 1

  # HPA scaled 2..3 — same envelope as the dev overlay. Conservative cap
  # on t3.medium to leave headroom for k3s control plane + self-hosted
  # runner (see ADR-006's RAM budget table and ADR-007).
  - target:
      kind: HorizontalPodAutoscaler
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 3

images:
  # The CI pipeline replaces this entry via `kustomize edit set image
  # devsu-devops-nodejs=<account>.dkr.ecr.<region>.amazonaws.com/devsu-devops-nodejs:<sha-tag>`
  # before applying. The defaults below let `kubectl apply -k` work standalone
  # if you replace them by hand.
  - name: devsu-devops-nodejs
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devsu-devops-nodejs
    newTag: latest
