apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev environment — runs in a separate namespace on the same k3s node.
# Deployed automatically from the `develop` branch via the CI/CD pipeline.
namespace: demo-devops-dev

resources:
  - ../../base

patches:
  # Rename the Namespace object so it matches the namespace field above.
  # (Kustomize sets namespace on all resources but skips the Namespace kind itself.)
  - target:
      kind: Namespace
      name: demo-devops
    patch: |-
      - op: replace
        path: /metadata/name
        value: demo-devops-dev

  # 1 replica on AWS due to t3.micro (1 GiB RAM) constraints.
  # The `local` overlay keeps 2 replicas + a real HPA to prove the test
  # brief requirement is met (see docs/decisions/ADR-006).
  - target:
      kind: Deployment
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Wire to Traefik (k3s default ingress controller, same as prod).
  # Host is replaced by the deploy script using the Elastic IP DNS name.
  - target:
      kind: Ingress
      name: demo-devops
    patch: |-
      - op: add
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /spec/rules/0/host
        value: demo-devops.54.84.139.24.nip.io

  # With 1 replica, minAvailable must be 0 — otherwise the PDB blocks
  # evictions during rolling updates and deploys hang indefinitely.
  - target:
      kind: PodDisruptionBudget
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 0

  # HPA capped at 1 — matches replicas. Resource still present in the
  # cluster (reviewer can see it), but it does not scale. The `local`
  # overlay demonstrates real autoscaling.
  - target:
      kind: HorizontalPodAutoscaler
      name: demo-devops
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1

images:
  # The CI pipeline replaces this via `kustomize edit set image
  # devsu-devops-nodejs=<account>.dkr.ecr.<region>.amazonaws.com/devsu-devops-nodejs:<sha-tag>`
  - name: devsu-devops-nodejs
    newName: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devsu-devops-nodejs
    newTag: latest
